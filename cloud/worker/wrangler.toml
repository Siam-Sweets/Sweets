name = "posapp-cloud-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"
workers_dev = true

[secrets]
required = [ "TURSO_DATABASE_URL", "TURSO_AUTH_TOKEN", "JWT_SIGNING_SECRET", "REFRESH_TOKEN_SECRET", "PASSWORD_PEPPER_SECRET" ]

[vars]
DEPLOYMENT_VERSION = "2.0.14"
API_VERSION = "1"
SCHEMA_VERSION = "4"
MINIMUM_CLIENT_SCHEMA_VERSION = "4"
ACCESS_TOKEN_TTL_SECONDS = "600"
REFRESH_TOKEN_TTL_DAYS = "30"
MAX_REQUEST_BYTES = "1048576"
MAX_SYNC_BATCH = "2"

[env.development]
name = "posapp-cloud-api-development"

[env.development.secrets]
required = [ "TURSO_DATABASE_URL", "TURSO_AUTH_TOKEN", "JWT_SIGNING_SECRET", "REFRESH_TOKEN_SECRET", "PASSWORD_PEPPER_SECRET" ]

[env.development.vars]
DEPLOYMENT_VERSION = "2.0.14"
API_VERSION = "1"
SCHEMA_VERSION = "4"
MINIMUM_CLIENT_SCHEMA_VERSION = "4"
ACCESS_TOKEN_TTL_SECONDS = "600"
REFRESH_TOKEN_TTL_DAYS = "7"
MAX_REQUEST_BYTES = "1048576"
MAX_SYNC_BATCH = "2"

[env.production]
name = "posapp-cloud-api-production"

[env.production.secrets]
required = [ "TURSO_DATABASE_URL", "TURSO_AUTH_TOKEN", "JWT_SIGNING_SECRET", "REFRESH_TOKEN_SECRET", "PASSWORD_PEPPER_SECRET" ]

[env.production.vars]
DEPLOYMENT_VERSION = "2.0.14"
API_VERSION = "1"
SCHEMA_VERSION = "4"
MINIMUM_CLIENT_SCHEMA_VERSION = "4"
ACCESS_TOKEN_TTL_SECONDS = "600"
REFRESH_TOKEN_TTL_DAYS = "30"
MAX_REQUEST_BYTES = "1048576"
MAX_SYNC_BATCH = "2"
