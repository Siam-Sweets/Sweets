name: Validate and deploy PosApp Cloud Worker

on:
  push:
    branches: [ main ]
    paths:
      - 'cloud/**'
      - '.github/workflows/deploy-worker.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'cloud/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Cloudflare Worker environment
        type: choice
        required: true
        default: development
        options: [development, production]

permissions:
  contents: read

concurrency:
  group: posapp-worker-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Worker, tests, and Turso SQL
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: cloud/worker/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check Worker
        run: npm run check

      - name: Run Worker security and sync tests
        run: npm test

      - name: Validate migrations with SQLite
        working-directory: .
        run: |
          sqlite3 /tmp/posapp-cloud-schema.db < cloud/migrations/0001_initial.sql
          sqlite3 /tmp/posapp-cloud-schema.db < cloud/migrations/0002_indexes.sql
          sqlite3 /tmp/posapp-cloud-schema.db < cloud/migrations/0003_migration_lock.sql
          sqlite3 /tmp/posapp-cloud-schema.db < cloud/migrations/0004_financial_composition_staging.sql
          test "$(sqlite3 /tmp/posapp-cloud-schema.db 'SELECT MAX(version) FROM schema_migrations;')" = "4"

      - name: Validate Wrangler configuration
        env:
          TURSO_DATABASE_URL: libsql://dry-run.invalid
          TURSO_AUTH_TOKEN: dry-run-token
          JWT_SIGNING_SECRET: dry-run-jwt-secret-that-is-at-least-32-characters
          REFRESH_TOKEN_SECRET: dry-run-refresh-secret-that-is-at-least-32-characters
          PASSWORD_PEPPER_SECRET: dry-run-password-pepper-that-is-at-least-32-characters
        run: npx wrangler deploy --dry-run --env development --outdir /tmp/posapp-worker-dry-run

  deploy:
    name: Deploy Cloudflare Worker
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: cloud/worker/package-lock.json

      - name: Install locked dependencies
        working-directory: cloud/worker
        run: npm ci

      - name: Validate Cloudflare and Worker secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          JWT_SIGNING_SECRET: ${{ secrets.JWT_SIGNING_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          PASSWORD_PEPPER_SECRET: ${{ secrets.PASSWORD_PEPPER_SECRET }}
          POSAPP_CLOUD_API_BASE_URL: ${{ secrets.POSAPP_CLOUD_API_BASE_URL }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID TURSO_DATABASE_URL TURSO_AUTH_TOKEN JWT_SIGNING_SECRET REFRESH_TOKEN_SECRET PASSWORD_PEPPER_SECRET POSAPP_CLOUD_API_BASE_URL; do
            if [[ -z "${!name}" ]]; then
              echo "::error title=Missing deployment secret::$name is not configured for the selected GitHub environment or repository."
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then exit 1; fi
          if (( ${#JWT_SIGNING_SECRET} < 32 )); then
            echo "::error title=Invalid authentication secret::JWT_SIGNING_SECRET must contain at least 32 characters."
            exit 1
          fi
          if (( ${#REFRESH_TOKEN_SECRET} < 32 )); then
            echo "::error title=Invalid authentication secret::REFRESH_TOKEN_SECRET must contain at least 32 characters."
            exit 1
          fi
          if (( ${#PASSWORD_PEPPER_SECRET} < 32 )); then
            echo "::error title=Invalid authentication secret::PASSWORD_PEPPER_SECRET must contain at least 32 characters."
            exit 1
          fi
          if [[ "$TURSO_DATABASE_URL" != libsql://* && "$TURSO_DATABASE_URL" != https://* ]]; then
            echo "::error title=Invalid Turso URL::TURSO_DATABASE_URL must start with libsql:// or https://."
            exit 1
          fi
          if [[ ! "$POSAPP_CLOUD_API_BASE_URL" =~ ^https://[^/?#]+/?$ ]]; then
            echo "::error title=Invalid Worker URL::POSAPP_CLOUD_API_BASE_URL must be an HTTPS Worker origin without an API path, query, or fragment."
            exit 1
          fi

      - name: Apply and verify Turso migrations
        working-directory: cloud/worker
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run migrate

      - name: Upload Worker secrets and deploy without printing values
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloud/worker
          packageManager: npm
          wranglerVersion: '4.112.0'
          environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
          secrets: |
            TURSO_DATABASE_URL
            TURSO_AUTH_TOKEN
            JWT_SIGNING_SECRET
            REFRESH_TOKEN_SECRET
            PASSWORD_PEPPER_SECRET
          command: deploy --env ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          JWT_SIGNING_SECRET: ${{ secrets.JWT_SIGNING_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          PASSWORD_PEPPER_SECRET: ${{ secrets.PASSWORD_PEPPER_SECRET }}

      - name: Verify deployed status page and organization preflight
        shell: bash
        env:
          POSAPP_CLOUD_API_BASE_URL: ${{ secrets.POSAPP_CLOUD_API_BASE_URL }}
        run: |
          set -euo pipefail
          base="${POSAPP_CLOUD_API_BASE_URL%/}"
          expected_version="$(node -p "require('./cloud/worker/package.json').version")"
          metadata_file="$(mktemp)"
          diagnostic_file="$(mktemp)"
          metadata_visible=0
          diagnostic_visible=0
          diagnostic_status="000"

          json_version() {
            node - "$1" <<'NODE'
          const { readFileSync } = require('node:fs');
          try {
            const report = JSON.parse(readFileSync(process.argv[2], 'utf8'));
            process.stdout.write(typeof report.deploymentVersion === 'string' ? report.deploymentVersion : '');
          } catch {
            process.stdout.write('');
          }
          NODE
          }

          header_value() {
            node - "$1" "$2" <<'NODE'
          const { readFileSync } = require('node:fs');
          const path = process.argv[2];
          const expectedName = process.argv[3].toLowerCase();
          let value = '';
          try {
            for (const line of readFileSync(path, 'utf8').split(/\r?\n/)) {
              const separator = line.indexOf(':');
              if (separator < 0) continue;
              if (line.slice(0, separator).trim().toLowerCase() === expectedName) {
                value = line.slice(separator + 1).trim();
              }
            }
          } catch {
            value = '';
          }
          process.stdout.write(value);
          NODE
          }

          # First wait for the lightweight metadata route. Cloudflare can serve
          # old and new Worker versions concurrently for a short rolling window.
          for attempt in {1..24}; do
            metadata_status="$(curl --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              --output "$metadata_file" --write-out '%{http_code}' \
              "$base/api/v1/meta?deployment_check=${GITHUB_RUN_ID:-manual}-$attempt" || true)"
            metadata_version="$(json_version "$metadata_file")"
            if [[ "$metadata_status" == "200" && "$metadata_version" == "$expected_version" ]]; then
              metadata_visible=1
              break
            fi
            echo "Waiting for Worker $expected_version metadata to propagate (attempt $attempt/24, deployed ${metadata_version:-unknown}, HTTP ${metadata_status:-000})."
            sleep 5
          done

          if [[ "$metadata_visible" -ne 1 ]]; then
            echo "::error title=Worker deployment not visible::The expected Worker version did not appear at $base/api/v1/meta."
            test ! -s "$metadata_file" || cat "$metadata_file"
            exit 1
          fi

          # Then wait independently for the diagnostic route. During a rolling
          # deployment /meta can already be new while /diagnostics is still
          # served by the previous version, including its previous HTTP status.
          for attempt in {1..10}; do
            diagnostic_status="$(curl --silent --show-error \
              --connect-timeout 10 --max-time 60 \
              --output "$diagnostic_file" --write-out '%{http_code}' \
              "$base/api/v1/diagnostics?deployment_check=${GITHUB_RUN_ID:-manual}-$attempt" || true)"
            diagnostic_version="$(json_version "$diagnostic_file")"
            if [[ "$diagnostic_version" == "$expected_version" ]]; then
              diagnostic_visible=1
              break
            fi
            echo "Waiting for Worker $expected_version diagnostics to propagate (attempt $attempt/10, deployed ${diagnostic_version:-unknown}, HTTP ${diagnostic_status:-000})."
            sleep 6
          done

          if [[ "$diagnostic_visible" -ne 1 ]]; then
            echo "::error title=Worker diagnostic deployment not visible::Metadata reached $expected_version, but the diagnostic route did not."
            test ! -s "$diagnostic_file" || cat "$diagnostic_file"
            exit 1
          fi

          if [[ "$diagnostic_status" != "200" ]]; then
            echo "::error title=Worker diagnostic request failed::Worker $expected_version returned HTTP ${diagnostic_status:-000}."
            test ! -s "$diagnostic_file" || cat "$diagnostic_file"
            exit 1
          fi

          node - "$diagnostic_file" "$expected_version" <<'NODE'
          const { readFileSync } = require('node:fs');
          const path = process.argv[2];
          const expectedVersion = process.argv[3];
          let report;
          try {
            report = JSON.parse(readFileSync(path, 'utf8'));
          } catch (error) {
            throw new Error(`Diagnostic endpoint did not return valid JSON: ${error.message}`);
          }

          if (report.deploymentVersion !== expectedVersion) {
            throw new Error(`Diagnostic route returned Worker ${report.deploymentVersion || 'unknown'} instead of ${expectedVersion}.`);
          }

          const checks = Array.isArray(report.checks) ? report.checks : [];
          console.log(`Worker ${report.deploymentVersion || 'unknown'} diagnostic request ${report.requestId || 'unknown'}`);
          for (const check of checks) {
            const detail = [check.stage, check.code, check.providerCode].filter(Boolean).join(' | ');
            console.log(`${check.status === 'pass' ? 'PASS' : 'FAIL'}: ${check.name}: ${check.message}${detail ? ` (${detail})` : ''}`);
          }

          if (report.ready !== true || report.accountCreationReady !== true) {
            const failed = checks.filter((check) => check.status !== 'pass');
            const summary = failed.length
              ? failed.map((check) => `${check.name}: ${check.stage || check.code || check.message}`).join('; ')
              : 'The diagnostic response did not mark account creation as ready.';
            const escaped = summary.replace(/%/g, '%25').replace(/\r/g, '%0D').replace(/\n/g, '%0A');
            console.error(`::error title=Worker account creation is not ready::${escaped}`);
            console.error(`Request ID: ${report.requestId || 'unknown'}`);
            process.exit(1);
          }
          NODE

          # Finally wait independently for the public root page. Its detailed
          # diagnostic cards are rendered by browser JavaScript, so validate the
          # static interface and machine-readable deployment headers rather than
          # grepping for dynamic check names in the initial HTML response.
          status_page_file="$(mktemp)"
          status_page_headers="$(mktemp)"
          status_page_visible=0
          status_page_status="000"
          for attempt in {1..10}; do
            status_page_status="$(curl --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              --dump-header "$status_page_headers" \
              --output "$status_page_file" --write-out '%{http_code}' \
              "$base/?deployment_check=${GITHUB_RUN_ID:-manual}-$attempt" || true)"
            status_page_version="$(header_value "$status_page_headers" "x-posapp-deployment-version")"
            status_page_marker="$(header_value "$status_page_headers" "x-posapp-status-page")"
            if [[ "$status_page_status" == "200" && "$status_page_version" == "$expected_version" && "$status_page_marker" == "1" ]]; then
              status_page_visible=1
              break
            fi
            echo "Waiting for Worker $expected_version status page to propagate (attempt $attempt/10, deployed ${status_page_version:-unknown}, marker ${status_page_marker:-missing}, HTTP ${status_page_status:-000})."
            sleep 6
          done

          if [[ "$status_page_visible" -ne 1 ]]; then
            echo "::error title=Worker status page deployment not visible::Metadata and diagnostics reached $expected_version, but the public root page did not."
            sed -n '1,30p' "$status_page_headers"
            test ! -s "$status_page_file" || sed -n '1,40p' "$status_page_file"
            exit 1
          fi

          if ! grep -Fq '<title>PosApp Cloud status</title>' "$status_page_file" \
            || ! grep -Fq 'name="posapp-status-page" content="true"' "$status_page_file" \
            || ! grep -Fq 'href="/api/v1/diagnostics"' "$status_page_file" \
            || ! grep -Fq 'id="run"' "$status_page_file"; then
            echo "::error title=Worker status page failed::Worker $expected_version returned HTTP 200 but the public diagnostic interface is incomplete."
            sed -n '1,40p' "$status_page_file"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "## PosApp Cloud Worker" >> "$GITHUB_STEP_SUMMARY"
          echo "Environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Turso migrations were applied idempotently and verified before the Worker deployment." >> "$GITHUB_STEP_SUMMARY"
          echo "The public status page passed its password, token, schema, atomic batch, rollback, synchronization, and audit preflight." >> "$GITHUB_STEP_SUMMARY"
