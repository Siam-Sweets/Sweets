name: Build PosApp

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.5)'
        required: false
        default: ''

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  PROJECT_PATH: src/PosApp.Wpf/PosApp.Wpf.csproj
  APP_NAME: PosApp

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Publish single-file self-contained exe
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration ${{ env.CONFIGURATION }} `
            --runtime win-x64 `
            --self-contained true `
            --p:PublishSingleFile=true `
            --p:IncludeNativeLibrariesForSelfExtract=true `
            --p:EnableCompressionInSingleFile=true `
            --p:DebugType=embedded `
            --p:PublishReadyToRun=false `
            --output ./publish

      - name: Verify exe exists
        shell: pwsh
        run: |
          $exe = Get-ChildItem ./publish -Filter "${{ env.APP_NAME }}.exe" | Select-Object -First 1
          if (-not $exe) { throw "${{ env.APP_NAME }}.exe not found in ./publish" }
          Write-Host "Built: $($exe.Name) - $([math]::Round($exe.Length / 1MB, 2)) MB"

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "./stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "./publish/${{ env.APP_NAME }}.exe" -Destination "$stage/${{ env.APP_NAME }}.exe"
          # Include a small README alongside the exe
          Copy-Item "./README.md" -Destination "$stage/README.md" -ErrorAction SilentlyContinue

      - name: Zip portable package
        shell: pwsh
        run: |
          Compress-Archive -Path "./stage/*" -DestinationPath "./${{ env.APP_NAME }}-portable.zip" -Force

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v?(.+)$') {
            $v = $matches[1]
          } elseif ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch' -and '${{ github.event.inputs.version }}' -ne '') {
            $v = '${{ github.event.inputs.version }}'.TrimStart('v')
          } else {
            $v = "0.0.0-dev.$($env:GITHUB_RUN_NUMBER)"
          }
          Write-Host "Version: $v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-exe-${{ steps.ver.outputs.version }}
          path: ./stage/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-portable-${{ steps.ver.outputs.version }}
          path: ./${{ env.APP_NAME }}-portable.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            v="${GITHUB_REF#refs/tags/}"
            v="${v#v}"
          else
            v="${{ inputs.version }}"
            v="${v#v}"
          fi
          echo "version=$v" >> $GITHUB_OUTPUT
          echo "Tag: v$v"

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-exe-${{ steps.ver.outputs.version }}
          path: ./release

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-portable-${{ steps.ver.outputs.version }}
          path: ./release

      - name: Rename for release
        shell: bash
        run: |
          cd ./release
          mv PosApp.exe PosApp-${{ steps.ver.outputs.version }}.exe 2>/dev/null || true
          mv PosApp-portable.zip PosApp-${{ steps.ver.outputs.version }}.zip 2>/dev/null || true
          ls -la

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: PosApp ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          files: |
            ./release/PosApp-${{ steps.ver.outputs.version }}.exe
            ./release/PosApp-${{ steps.ver.outputs.version }}.zip
            ./README.md
