name: Build PosApp

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.19) - leave empty for dev build'
        required: false
        default: ''

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  PROJECT_PATH: src/PosApp.Wpf/PosApp.Wpf.csproj
  APP_NAME: PosApp

# A newer main-branch build supersedes an older rolling dev build. Cancelling
# the older run also prevents two jobs from replacing dev-build assets at once.
concurrency:
  group: posapp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Restore synchronization tests
        run: dotnet restore tests/PosApp.Sync.Tests/PosApp.Sync.Tests.csproj

      - name: Run local synchronization and localization tests
        run: >-
          dotnet test tests/PosApp.Sync.Tests/PosApp.Sync.Tests.csproj
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          --logger "trx;LogFileName=posapp-sync-tests.trx"

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $projectText = Get-Content -LiteralPath "${{ env.PROJECT_PATH }}" -Raw
          $projectMatch = [regex]::Match($projectText, '<Version>\s*([^<]+?)\s*</Version>')
          if (-not $projectMatch.Success) { throw "The project Version property was not found." }
          $projectVersion = $projectMatch.Groups[1].Value.Trim()
          $projectCoreMatch = [regex]::Match($projectVersion, '^(\d+)\.(\d+)\.(\d+)')
          if (-not $projectCoreMatch.Success) { throw "Invalid project version: $projectVersion" }
          $projectCore = "$($projectCoreMatch.Groups[1].Value).$($projectCoreMatch.Groups[2].Value).$($projectCoreMatch.Groups[3].Value)"

          if ($env:GITHUB_REF -match 'refs/tags/v?(.+)$') {
            $v = $matches[1]
            $isRelease = 'true'
          } elseif ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch' -and '${{ github.event.inputs.version }}' -ne '') {
            $v = '${{ github.event.inputs.version }}'.TrimStart('v')
            $isRelease = 'true'
          } else {
            $v = "$projectCore-dev.$($env:GITHUB_RUN_NUMBER)"
            $isRelease = 'false'
          }

          $requestedCoreMatch = [regex]::Match($v, '^(\d+)\.(\d+)\.(\d+)')
          if (-not $requestedCoreMatch.Success) { throw "Invalid build version: $v" }
          $requestedCore = "$($requestedCoreMatch.Groups[1].Value).$($requestedCoreMatch.Groups[2].Value).$($requestedCoreMatch.Groups[3].Value)"
          if ($isRelease -eq 'true' -and $requestedCore -ne $projectCore) {
            throw "Release version $requestedCore does not match project version $projectCore. Update the project version before publishing."
          }

          if ($isRelease -eq 'true') {
            $numericParts = @([regex]::Matches($v, '\d+') | ForEach-Object { [int64]$_.Value })
            while ($numericParts.Count -lt 4) { $numericParts += 0 }
            $numericParts = @($numericParts | Select-Object -First 4)
          } else {
            $numericParts = @(
              [int64]$requestedCoreMatch.Groups[1].Value,
              [int64]$requestedCoreMatch.Groups[2].Value,
              [int64]$requestedCoreMatch.Groups[3].Value,
              [int64]$env:GITHUB_RUN_NUMBER
            )
          }
          $numericParts = @($numericParts | ForEach-Object { [Math]::Min([int64]65535, $_) })
          $numericVersion = $numericParts -join '.'

          Write-Host "Project: $projectCore; Installer: $v; Windows version: $numericVersion (release=$isRelease)"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "numeric_version=$numericVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "is_release=$isRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Configure cloud API endpoint
        shell: pwsh
        env:
          CLOUD_API_BASE_URL_SECRET: ${{ secrets.POSAPP_CLOUD_API_BASE_URL }}
        run: |
          $raw = $env:CLOUD_API_BASE_URL_SECRET
          if ([string]::IsNullOrWhiteSpace($raw)) {
            if ($env:GITHUB_EVENT_NAME -eq 'pull_request') {
              Write-Warning 'POSAPP_CLOUD_API_BASE_URL is unavailable for this pull request. The verification build will compile with online account creation disabled.'
              'PosAppCloudApiBaseUrl=__NOT_CONFIGURED__' | Out-File -FilePath $env:GITHUB_ENV -Append
              exit 0
            }
            throw 'Missing required GitHub Actions secret: POSAPP_CLOUD_API_BASE_URL'
          }

          $candidate = $raw.Trim().TrimEnd('/')
          $uri = $null
          if (-not [Uri]::TryCreate($candidate, [UriKind]::Absolute, [ref]$uri)) {
            throw 'POSAPP_CLOUD_API_BASE_URL must be an absolute HTTPS URL.'
          }
          if ($uri.Scheme -ne 'https') {
            throw 'POSAPP_CLOUD_API_BASE_URL must use HTTPS.'
          }
          if (-not [string]::IsNullOrWhiteSpace($uri.Query) -or
              -not [string]::IsNullOrWhiteSpace($uri.Fragment) -or
              $uri.AbsolutePath.Trim('/') -ne '') {
            throw 'POSAPP_CLOUD_API_BASE_URL must contain only the Worker origin, without /api paths, query parameters, or fragments.'
          }

          $normalized = $uri.GetLeftPart([UriPartial]::Authority)
          "PosAppCloudApiBaseUrl=$normalized" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host 'Cloud API endpoint validated and embedded into the desktop build.'

      - name: Build
        run: >-
          dotnet build ${{ env.PROJECT_PATH }}
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          -p:Version=${{ steps.ver.outputs.version }}
          -p:AssemblyVersion=${{ steps.ver.outputs.numeric_version }}
          -p:FileVersion=${{ steps.ver.outputs.numeric_version }}
          -p:InformationalVersion=${{ steps.ver.outputs.version }}
          -p:PosAppCloudApiBaseUrl="$env:PosAppCloudApiBaseUrl"

      - name: Publish single-file self-contained exe
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            --configuration ${{ env.CONFIGURATION }} `
            --runtime win-x64 `
            --self-contained true `
            --p:PublishSingleFile=true `
            --p:IncludeNativeLibrariesForSelfExtract=true `
            --p:EnableCompressionInSingleFile=true `
            --p:DebugType=embedded `
            --p:PublishReadyToRun=false `
            --p:Version=${{ steps.ver.outputs.version }} `
            --p:AssemblyVersion=${{ steps.ver.outputs.numeric_version }} `
            --p:FileVersion=${{ steps.ver.outputs.numeric_version }} `
            --p:InformationalVersion=${{ steps.ver.outputs.version }} `
            --p:PosAppCloudApiBaseUrl="$env:PosAppCloudApiBaseUrl" `
            --output ./publish

      - name: Sign application executable
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $certificateBase64 = $env:SIGNING_CERTIFICATE_BASE64
          $certificatePassword = $env:SIGNING_CERTIFICATE_PASSWORD
          if ([string]::IsNullOrWhiteSpace($certificateBase64) -or
              [string]::IsNullOrWhiteSpace($certificatePassword)) {
            Write-Warning "Signing secrets are not configured. Artifacts will build, but the in-app safe updater will reject the unsigned installer."
            "SIGNED_BUILD=false" | Out-File -FilePath $env:GITHUB_ENV -Append
            exit 0
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP 'posapp-signing.pfx'
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($certificateBase64))
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
            Where-Object FullName -Match '\\x64\\signtool\.exe$' |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signTool) { throw 'Windows signtool.exe was not found.' }

          try {
            & $signTool.FullName sign /f $certificatePath /p $certificatePassword /fd SHA256 `
              /tr http://timestamp.digicert.com /td SHA256 "./publish/${{ env.APP_NAME }}.exe"
            if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE." }
            & $signTool.FullName verify /pa /v "./publish/${{ env.APP_NAME }}.exe"
            if ($LASTEXITCODE -ne 0) { throw "The application signature could not be verified." }
            "SIGNTOOL_PATH=$($signTool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            "SIGNING_CERTIFICATE_PATH=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Append
            "SIGNED_BUILD=true" | Out-File -FilePath $env:GITHUB_ENV -Append
          } catch {
            Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue
            throw
          }

      - name: Verify exe exists and report size
        shell: pwsh
        run: |
          $exe = Get-ChildItem ./publish -Filter "${{ env.APP_NAME }}.exe" | Select-Object -First 1
          if (-not $exe) { throw "${{ env.APP_NAME }}.exe not found in ./publish" }
          $sizeMB = [math]::Round($exe.Length / 1MB, 2)
          Write-Host "✅ Built: $($exe.Name) - $sizeMB MB"
          "size_mb=$sizeMB" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: exe_info

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "./stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "./publish/${{ env.APP_NAME }}.exe" -Destination "$stage/${{ env.APP_NAME }}.exe"
          Copy-Item "./README.md" -Destination "$stage/README.md" -ErrorAction SilentlyContinue
          # Write a small INSTALL.txt so users know what to do with SmartScreen
          @"
          PosApp - Quick Install
          ======================

          1. Double-click PosApp.exe to launch.
          2. Verify that Windows shows the expected PosApp publisher. If Windows
             cannot verify the publisher, obtain a signed installer from the trusted
             PosApp release source instead of bypassing the warning.
          3. First run will create the database in:
             %LOCALAPPDATA%\PosApp\posapp.db
          4. Sign in to an existing online organization or create one, then let
             the complete initial synchronization finish before cashier login.

          To remove only the program: delete PosApp.exe. Business data remains in
          %LOCALAPPDATA%\PosApp. Delete that data folder only after making a backup
          and only when you intentionally want to erase the store database.
          "@ | Out-File -FilePath "$stage/INSTALL.txt" -Encoding utf8

      - name: Zip portable package
        shell: pwsh
        run: |
          Compress-Archive -Path "./stage/*" -DestinationPath "./${{ env.APP_NAME }}-portable.zip" -Force

      - name: Locate or install Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $iscc)) {
            choco install innosetup --no-progress --yes
          }
          if (-not (Test-Path -LiteralPath $iscc)) {
            throw "Inno Setup 6 compiler was not found."
          }
          "ISCC_PATH=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build guided setup installer
        shell: pwsh
        run: |
          $output = Join-Path $PWD "installer-output"
          New-Item -ItemType Directory -Force -Path $output | Out-Null
          & $env:ISCC_PATH `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "/DMyAppNumericVersion=${{ steps.ver.outputs.numeric_version }}" `
            "/O$output" `
            ".\installer\PosApp.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE." }
          $setup = Join-Path $output "PosApp-${{ steps.ver.outputs.version }}-Setup.exe"
          if (-not (Test-Path -LiteralPath $setup)) { throw "Setup installer was not created: $setup" }

      - name: Sign guided setup installer
        if: env.SIGNED_BUILD == 'true'
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $setup = "./installer-output/PosApp-${{ steps.ver.outputs.version }}-Setup.exe"
          & $env:SIGNTOOL_PATH sign /f $env:SIGNING_CERTIFICATE_PATH `
            /p $env:SIGNING_CERTIFICATE_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 $setup
          if ($LASTEXITCODE -ne 0) { throw "Installer signing failed with exit code $LASTEXITCODE." }
          & $env:SIGNTOOL_PATH verify /pa /v $setup
          if ($LASTEXITCODE -ne 0) { throw "The installer signature could not be verified." }
          Remove-Item -LiteralPath $env:SIGNING_CERTIFICATE_PATH -Force -ErrorAction SilentlyContinue

      - name: Upload exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-exe
          path: ./stage/${{ env.APP_NAME }}.exe
          if-no-files-found: error
          retention-days: 90

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-portable
          path: ./${{ env.APP_NAME }}-portable.zip
          if-no-files-found: error
          retention-days: 90

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-installer
          path: ./installer-output/${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-Setup.exe
          if-no-files-found: error
          retention-days: 90

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $summaryPath = $env:GITHUB_STEP_SUMMARY
          $exePath = Join-Path $PWD "publish\${{ env.APP_NAME }}.exe"
          $installerPath = Join-Path $PWD "installer-output\${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-Setup.exe"
          $portablePath = Join-Path $PWD "${{ env.APP_NAME }}-portable.zip"

          "## Build Summary" | Out-File -FilePath $summaryPath -Append -Encoding utf8

          if (Test-Path -LiteralPath $exePath -PathType Leaf) {
            $exe = Get-Item -LiteralPath $exePath
            $sizeMB = [math]::Round($exe.Length / 1MB, 2)
            "✅ ${{ env.APP_NAME }}.exe built successfully ($sizeMB MB)" |
              Out-File -FilePath $summaryPath -Append -Encoding utf8
          } else {
            "❌ ${{ env.APP_NAME }}.exe was not created. Review the first failed Build, Publish, or Verify step above." |
              Out-File -FilePath $summaryPath -Append -Encoding utf8
          }

          if (Test-Path -LiteralPath $portablePath -PathType Leaf) {
            "✅ Portable ZIP built successfully" |
              Out-File -FilePath $summaryPath -Append -Encoding utf8
          } else {
            "⚠️ Portable ZIP was not created." |
              Out-File -FilePath $summaryPath -Append -Encoding utf8
          }

          if (Test-Path -LiteralPath $installerPath -PathType Leaf) {
            "✅ Guided Windows installer built successfully" |
              Out-File -FilePath $summaryPath -Append -Encoding utf8
          } else {
            "⚠️ Guided Windows installer was not created." |
              Out-File -FilePath $summaryPath -Append -Encoding utf8
          }

          "" | Out-File -FilePath $summaryPath -Append -Encoding utf8
          "### Download the installer or portable exe" |
            Out-File -FilePath $summaryPath -Append -Encoding utf8
          "When the build succeeds, scroll down to the **Artifacts** section at the bottom of this page." |
            Out-File -FilePath $summaryPath -Append -Encoding utf8

  release:
    name: Publish GitHub Release
    needs: build
    # Run on: tag push, manual dispatch with version, OR every push to main (rolling dev release)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Determine version and tag
        id: ver
        shell: bash
        run: |
          project_version="$(sed -n 's:.*<Version>[[:space:]]*\([^<]*\)[[:space:]]*</Version>.*:\1:p' "${{ env.PROJECT_PATH }}" | head -n 1 | xargs)"
          if [[ ! "$project_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            echo "Invalid or missing project version: $project_version" >&2
            exit 1
          fi
          project_core="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            v="${GITHUB_REF#refs/tags/}"
            v="${v#v}"
            tag="v${v}"
            is_release="true"
            is_prerelease="false"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            v="${{ inputs.version }}"
            v="${v#v}"
            tag="v${v}"
            is_release="true"
            is_prerelease="false"
          else
            # Rolling dev builds retain the actual product version so the offline
            # updater can correctly compare them with the installed application.
            v="${project_core}-dev.${{ github.run_number }}"
            tag="dev-build"
            is_release="false"
            is_prerelease="true"
          fi

          if [[ ! "$v" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            echo "Invalid release version: $v" >&2
            exit 1
          fi
          requested_core="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          if [[ "$is_release" == "true" && "$requested_core" != "$project_core" ]]; then
            echo "Release version $requested_core does not match project version $project_core." >&2
            exit 1
          fi

          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "Tag: $tag, Version: $v, Project: $project_core, Release: $is_release"

      - name: Download exe artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.APP_NAME }}-exe
          path: ./release

      - name: Download zip artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.APP_NAME }}-portable
          path: ./release

      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.APP_NAME }}-installer
          path: ./release

      - name: Rename for release
        shell: bash
        run: |
          cd ./release
          ls -la
          mv PosApp.exe PosApp-${{ steps.ver.outputs.version }}.exe 2>/dev/null || true
          mv PosApp-portable.zip PosApp-${{ steps.ver.outputs.version }}.zip 2>/dev/null || true
          ls -la

      - name: Publish release with retry
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.ver.outputs.version }}
          RELEASE_TAG: ${{ steps.ver.outputs.tag }}
          IS_RELEASE: ${{ steps.ver.outputs.is_release }}
        run: |
          set -euo pipefail

          files=(
            "./release/PosApp-${VERSION}.exe"
            "./release/PosApp-${VERSION}.zip"
            "./release/PosApp-${VERSION}-Setup.exe"
          )

          for file in "${files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Required release artifact is missing: $file" >&2
              exit 1
            fi
          done

          # Retry transient GitHub API and upload failures. Every helper
          # explicitly returns failures because Bash disables `errexit` for functions
          # invoked from an if/until condition.
          retry() {
            local max_attempts=5
            local attempt=1
            local delay=4
            local status

            while true; do
              if "$@"; then
                return 0
              else
                status=$?
              fi

              if (( attempt >= max_attempts )); then
                echo "Command failed after ${attempt} attempts (exit ${status}): $*" >&2
                return "$status"
              fi

              echo "Attempt ${attempt} failed; retrying in ${delay}s: $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          write_dev_notes() {
            DEV_NOTES="./release/dev-release-notes.md"
            cat > "$DEV_NOTES" <<EOF
          # PosApp Dev Build

          **Version:** ${VERSION}
          **Built from commit:** ${GITHUB_SHA}

          ## Download
          - **PosApp-${VERSION}-Setup.exe** — recommended guided installer with license, install location, Start Menu, and optional Desktop shortcut
          - **PosApp-${VERSION}.exe** — single-file Windows x64 executable (no .NET install needed)
          - **PosApp-${VERSION}.zip** — portable zip with exe, README, and INSTALL.txt

          ## Install
          1. Download PosApp-${VERSION}-Setup.exe
          2. Confirm that Windows shows the expected PosApp publisher. Do not bypass an unknown-publisher warning.
          3. Follow the setup wizard and choose whether to create a Desktop shortcut
          4. Complete the first-run store and administrator setup inside PosApp

          ## What's inside
          - Offline-first POS and checkout with barcode scanner support
          - Products, purchases, inventory, register sessions, and physical counts
          - Customer contact records and purchase history
          - Sales history with refunds, voids, held sales, and split payments
          - Users and roles (Cashier / Manager / Admin)
          - Reports and dashboard
          - Bilingual EN + বাংলা UI with Light and Dark themes
          - ESC/POS receipt-printer support and reliable single-click checkboxes
          - Safe local updates with verified pre-update database backups
          - Local SQLite operation with optional Cloudflare Worker + Turso synchronization

          _This is an automated development build. For a stable release, push a tag such as vX.Y.Z._
          EOF
          }

          # Resolve a release from the complete REST collection instead of relying on
          # `gh release view <tag>`, which can temporarily return 404 after a tag moves.
          find_release_id() {
            local rows
            local id
            local tag

            rows="$(
              gh api --paginate \
                "repos/${GH_REPO}/releases?per_page=100" \
                --jq '.[] | [.id, .tag_name] | @tsv'
            )" || return 2

            while IFS=$'\t' read -r id tag; do
              if [[ "$tag" == "$RELEASE_TAG" ]]; then
                printf '%s\n' "$id"
                return 0
              fi
            done <<< "$rows"

            return 1
          }

          find_asset_id() {
            local release_id="$1"
            local wanted_name="$2"
            local rows
            local id
            local name

            rows="$(
              gh api --paginate \
                "repos/${GH_REPO}/releases/${release_id}/assets?per_page=100" \
                --jq '.[] | [.id, .name] | @tsv'
            )" || return 2

            while IFS=$'\t' read -r id name; do
              if [[ "$name" == "$wanted_name" ]]; then
                printf '%s\n' "$id"
                return 0
              fi
            done <<< "$rows"

            return 1
          }

          delete_existing_dev_release() {
            local release_id
            local find_status

            if release_id="$(find_release_id)"; then
              echo "Deleting stale rolling release ID ${release_id} before moving ${RELEASE_TAG}."
              gh api --method DELETE \
                "repos/${GH_REPO}/releases/${release_id}" >/dev/null || return 2
            else
              find_status=$?
              if (( find_status != 1 )); then
                return "$find_status"
              fi
            fi
          }

          move_dev_tag() {
            git tag --force "$RELEASE_TAG" "$GITHUB_SHA" || return 1
            git push origin "refs/tags/${RELEASE_TAG}" --force || return 1
          }

          replace_release_asset() {
            local release_id="$1"
            local upload_url="$2"
            local file="$3"
            local file_name="${file##*/}"
            local asset_id
            local find_status
            local response_file

            if [[ ! "$file_name" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "Unsafe release asset filename: $file_name" >&2
              return 1
            fi

            if asset_id="$(find_asset_id "$release_id" "$file_name")"; then
              gh api --method DELETE \
                "repos/${GH_REPO}/releases/assets/${asset_id}" >/dev/null || return 2
            else
              find_status=$?
              if (( find_status != 1 )); then
                return "$find_status"
              fi
            fi

            response_file="$(mktemp)" || return 1
            if ! curl --location --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2026-03-10" \
              --header "Content-Type: application/octet-stream" \
              --data-binary "@${file}" \
              --output "$response_file" \
              "${upload_url}?name=${file_name}"; then
              cat "$response_file" >&2 || true
              rm -f "$response_file"
              return 2
            fi

            if ! jq -e --arg expected "$file_name" \
              '.name == $expected and .state == "uploaded"' \
              "$response_file" >/dev/null; then
              echo "GitHub returned an invalid upload response for ${file_name}:" >&2
              cat "$response_file" >&2 || true
              rm -f "$response_file"
              return 1
            fi

            rm -f "$response_file"
          }

          publish_release() {
            local release_id
            local find_status
            local title
            local notes
            local response_file
            local upload_template
            local upload_url
            local file

            if [[ "$IS_RELEASE" == "false" ]]; then
              title="PosApp Dev Build (run #${GITHUB_RUN_NUMBER})"
              notes="$(< "$DEV_NOTES")"
            else
              title="PosApp ${VERSION}"
            fi

            response_file="$(mktemp)" || return 1

            if release_id="$(find_release_id)"; then
              if [[ "$IS_RELEASE" == "false" ]]; then
                gh api --method PATCH \
                  "repos/${GH_REPO}/releases/${release_id}" \
                  --raw-field "tag_name=${RELEASE_TAG}" \
                  --raw-field "name=${title}" \
                  --raw-field "body=${notes}" \
                  --field draft=false \
                  --field prerelease=true > "$response_file" || {
                    rm -f "$response_file"
                    return 2
                  }
              else
                gh api --method PATCH \
                  "repos/${GH_REPO}/releases/${release_id}" \
                  --raw-field "tag_name=${RELEASE_TAG}" \
                  --raw-field "name=${title}" \
                  --field draft=false \
                  --field prerelease=false > "$response_file" || {
                    rm -f "$response_file"
                    return 2
                  }
              fi
            else
              find_status=$?
              if (( find_status != 1 )); then
                rm -f "$response_file"
                return "$find_status"
              fi

              if [[ "$IS_RELEASE" == "false" ]]; then
                gh api --method POST \
                  "repos/${GH_REPO}/releases" \
                  --raw-field "tag_name=${RELEASE_TAG}" \
                  --raw-field "target_commitish=${GITHUB_SHA}" \
                  --raw-field "name=${title}" \
                  --raw-field "body=${notes}" \
                  --field draft=false \
                  --field prerelease=true > "$response_file" || {
                    rm -f "$response_file"
                    return 2
                  }
              else
                gh api --method POST \
                  "repos/${GH_REPO}/releases" \
                  --raw-field "tag_name=${RELEASE_TAG}" \
                  --raw-field "target_commitish=${GITHUB_SHA}" \
                  --raw-field "name=${title}" \
                  --field draft=false \
                  --field prerelease=false \
                  --field generate_release_notes=true > "$response_file" || {
                    rm -f "$response_file"
                    return 2
                  }
              fi
            fi

            release_id="$(jq -er '.id | tostring' "$response_file")" || {
              echo "GitHub release response did not contain a valid ID." >&2
              cat "$response_file" >&2 || true
              rm -f "$response_file"
              return 1
            }

            upload_template="$(jq -er '.upload_url' "$response_file")" || {
              echo "GitHub release response did not contain an upload URL." >&2
              cat "$response_file" >&2 || true
              rm -f "$response_file"
              return 1
            }
            rm -f "$response_file"

            if [[ ! "$release_id" =~ ^[0-9]+$ ]]; then
              echo "GitHub returned an invalid release ID: $release_id" >&2
              return 1
            fi

            # GitHub documents the returned upload_url as the source of truth for
            # asset uploads. Remove its URI-template suffix before adding the name.
            upload_url="${upload_template%%\{*}"
            if [[ "$upload_url" != https://uploads.github.com/*/releases/*/assets ]]; then
              echo "GitHub returned an unexpected release upload URL: $upload_url" >&2
              return 1
            fi

            PUBLISHED_RELEASE_ID="$release_id"

            for file in "${files[@]}"; do
              replace_release_asset "$release_id" "$upload_url" "$file" || return $?
            done
          }

          verify_published_release() {
            local release_id="$PUBLISHED_RELEASE_ID"
            local release_json
            local actual_tag
            local assets
            local file
            local file_name
            local resolved_id

            if ! release_json="$(gh api "repos/${GH_REPO}/releases/${release_id}")"; then
              echo "Release ID ${release_id} was not readable; resolving ${RELEASE_TAG} again." >&2
              resolved_id="$(find_release_id)" || return $?
              release_id="$resolved_id"
              PUBLISHED_RELEASE_ID="$release_id"
              release_json="$(gh api "repos/${GH_REPO}/releases/${release_id}")" || return 2
            fi

            actual_tag="$(jq -er '.tag_name' <<< "$release_json")" || return 1
            if [[ "$actual_tag" != "$RELEASE_TAG" ]]; then
              echo "Published release tag mismatch: $actual_tag" >&2
              return 1
            fi

            if [[ "$(jq -er '.draft' <<< "$release_json")" != "false" ]]; then
              echo "Published release is still a draft." >&2
              return 1
            fi

            assets="$(
              gh api --paginate \
                "repos/${GH_REPO}/releases/${release_id}/assets?per_page=100" \
                --jq '.[] | select(.state == "uploaded") | .name'
            )" || return 2

            for file in "${files[@]}"; do
              file_name="${file##*/}"
              if ! grep --fixed-strings --line-regexp --quiet "$file_name" <<< "$assets"; then
                echo "Release asset verification failed: $file_name" >&2
                return 1
              fi
            done

            jq '{tag_name, name, html_url, draft, prerelease, immutable}' <<< "$release_json"
          }

          gh --version

          if [[ "$IS_RELEASE" == "false" ]]; then
            write_dev_notes

            # A rolling release is tied to its tag. Delete the old release record
            # before force-moving the tag so GitHub cannot leave us with a stale,
            # upload-ineligible release ID.
            retry delete_existing_dev_release
            retry move_dev_tag
          fi

          retry publish_release
          retry verify_published_release
